# Prometheus configuration for JavaInfoHunter
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'javainfohunter-monitor'

# Alerting configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional)
rule_files: []

# Scrape configurations
scrape_configs:
  # Spring Boot Actuator metrics
  - job_name: 'javainfohunter-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'javainfohunter-api'
          environment: 'development'

  - job_name: 'javainfohunter-crawler'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: 'javainfohunter-crawler'
          environment: 'development'

  - job_name: 'javainfohunter-processor'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          application: 'javainfohunter-processor'
          environment: 'development'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
