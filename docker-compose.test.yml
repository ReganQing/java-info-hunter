# Docker Compose for Local E2E Testing
# Usage: docker-compose -f docker-compose.test.yml up -d
# Cleanup: docker-compose -f docker-compose.test.yml down -v

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: javainfohunter-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: javainfohunter_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - test-network

  rabbitmq:
    image: rabbitmq:3.12-alpine
    container_name: javainfohunter-test-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_test_data:/var/lib/rabbitmq
    networks:
      - test-network

  redis:
    image: redis:7-alpine
    container_name: javainfohunter-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_test_data:/data
    networks:
      - test-network

  # Optional: MinIO for S3-compatible storage testing
  minio:
    image: minio/minio:latest
    container_name: javainfohunter-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_test_data:/data
    networks:
      - test-network
    profiles:
      - storage  # Only start with --profile storage

  # Optional: Prometheus for metrics testing
  prometheus:
    image: prom/prometheus:latest
    container_name: javainfohunter-test-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-test.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_test_data:/prometheus
    networks:
      - test-network
    profiles:
      - monitoring  # Only start with --profile monitoring

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: javainfohunter-test-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_test_data:/var/lib/grafana
    networks:
      - test-network
    profiles:
      - monitoring  # Only start with --profile monitoring

volumes:
  postgres_test_data:
    driver: local
  rabbitmq_test_data:
    driver: local
  redis_test_data:
    driver: local
  minio_test_data:
    driver: local
  prometheus_test_data:
    driver: local
  grafana_test_data:
    driver: local

networks:
  test-network:
    driver: bridge
