# GitHub Actions Workflow - E2E Tests
# Runs end-to-end tests on every push and pull request
# Uses Testcontainers for service isolation

name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  # Use GitHub Secrets for production (default values for CI)
  DB_USERNAME: ${{ secrets.DB_USERNAME || 'postgres' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'postgres' }}
  RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME || 'admin' }}
  RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD || 'admin' }}

jobs:
  # Quick smoke tests - runs on all events
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: javainfohunter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        env:
          RABBITMQ_DEFAULT_USER: ${{ env.RABBITMQ_USERNAME }}
          RABBITMQ_DEFAULT_PASS: ${{ env.RABBITMQ_PASSWORD }}
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build project
        run: ./mvnw clean install -DskipTests -DskipITs

      - name: Run smoke tests (integration tests only)
        run: ./mvnw test -pl javainfohunter-e2e -Dtest="*IntegrationTest" -Dtestcontainers.enable=false
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/javainfohunter_test
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: admin
          SPRING_RABBITMQ_PASSWORD: admin
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            javainfohunter-e2e/target/surefire-reports/
            javainfohunter-e2e/target/test-results/

  # Full E2E tests - runs on main/develop pushes and manually
  e2e-tests:
    name: Full E2E Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: javainfohunter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        env:
          RABBITMQ_DEFAULT_USER: ${{ env.RABBITMQ_USERNAME }}
          RABBITMQ_DEFAULT_PASS: ${{ env.RABBITMQ_PASSWORD }}
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build with dependencies
        run: ./mvnw clean install -DskipTests -DskipITs

      - name: Run all E2E tests
        run: ./mvnw test -pl javainfohunter-e2e -Dtestcontainers.enable=false
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/javainfohunter_test
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: admin
          SPRING_RABBITMQ_PASSWORD: admin
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Generate JaCoCo coverage report
        run: ./mvnw jacoco:report -pl javainfohunter-e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./javainfohunter-e2e/target/site/jacoco/jacoco.xml
          flags: e2e
          name: e2e-coverage-report
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            javainfohunter-e2e/target/surefire-reports/
            javainfohunter-e2e/target/test-results/
            javainfohunter-e2e/target/site/jacoco/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            javainfohunter-e2e/target/surefire-reports/*.xml
          check_name: E2E Test Results

  # API endpoint tests - validates REST API contract
  api-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: javainfohunter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        env:
          RABBITMQ_DEFAULT_USER: ${{ env.RABBITMQ_USERNAME }}
          RABBITMQ_DEFAULT_PASS: ${{ env.RABBITMQ_PASSWORD }}
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build project
        run: ./mvnw clean install -DskipTests -DskipITs

      - name: Run API endpoint tests
        run: ./mvnw test -pl javainfohunter-e2e -Dtest="ApiEndpointsE2ETest" -Dtestcontainers.enable=false
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/javainfohunter_test
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: admin
          SPRING_RABBITMQ_PASSWORD: admin
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: javainfohunter-e2e/target/surefire-reports/
