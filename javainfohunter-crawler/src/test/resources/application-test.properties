# Test Configuration for javainfohunter-crawler

spring.profiles.active=test

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway (disabled for H2 in-memory tests)
spring.flyway.enabled=false

# RabbitMQ Test Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.publisher-confirm-type=none
spring.rabbitmq.publisher-returns=false

# Crawler Configuration
javainfohunter.crawler.enabled=true
javainfohunter.crawler.scheduler.enabled=false

javainfohunter.crawler.feed.max-articles-per-feed=100
javainfohunter.crawler.feed.connection-timeout=5000
javainfohunter.crawler.feed.read-timeout=10000
javainfohunter.crawler.feed.user-agent=JavaInfoHunter-Test/1.0

javainfohunter.crawler.processing.batch-size=10
javainfohunter.crawler.processing.max-retries=3
javainfohunter.crawler.processing.retry-backoff=1000

javainfohunter.crawler.deduplication.enabled=true
javainfohunter.crawler.deduplication.hash-algorithm=SHA-256

# Logging
logging.level.com.ron.javainfohunter=DEBUG
logging.level.com.rometools=WARN
logging.level.org.springframework=WARN
