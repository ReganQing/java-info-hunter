spring:
  application:
    name: javainfohunter-crawler

  # Profile Management
  profiles:
    group:
      develop:
        - "develop"
        - "database"

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:javainfohunter}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 3
        max-concurrency: 10
    connection-timeout: 15000
    cache:
      channel:
        size: 25
      connection:
        mode: channel

server:
  port: 8081

# Crawler Module Configuration
javainfohunter:
  crawler:
    # Enable/disable crawler
    enabled: ${CRAWLER_ENABLED:true}

    # Scheduler Configuration
    scheduler:
      enabled: ${CRAWLER_SCHEDULER_ENABLED:true}
      initial-delay: ${CRAWLER_INITIAL_DELAY:30000} # 30 seconds
      fixed-rate: ${CRAWLER_FIXED_RATE:3600000} # 1 hour

    # Feed Processing Configuration
    feed:
      max-articles-per-feed: ${MAX_ARTICLES_PER_FEED:100}
      connection-timeout: ${FEED_CONNECTION_TIMEOUT:30000} # 30 seconds
      read-timeout: ${FEED_READ_TIMEOUT:60000} # 60 seconds
      user-agent: ${FEED_USER_AGENT:JavaInfoHunter/1.0}

    # Content Processing
    processing:
      batch-size: ${CRAWLER_BATCH_SIZE:50}
      max-retries: ${CRAWLER_MAX_RETRIES:3}
      retry-backoff: ${CRAWLER_RETRY_BACKOFF:60000} # 1 minute

    # Deduplication
    deduplication:
      enabled: ${DEDUPLICATION_ENABLED:true}
      hash-algorithm: ${HASH_ALGORITHM:SHA-256}

# Logging Configuration
logging:
  level:
    root: INFO
    com.ron.javainfohunter: DEBUG
    org.springframework.amqp: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
