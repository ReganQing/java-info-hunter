# Prometheus Configuration for Local Testing
# Usage: docker-compose -f docker-compose.test.yml --profile monitoring up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # JavaInfoHunter application metrics
  - job_name: 'javainfohunter'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
