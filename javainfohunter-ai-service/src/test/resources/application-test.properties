# RabbitMQ Test Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=25672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# Exclude ALL Spring AI Alibaba auto-configurations
spring.autoconfigure.exclude[0]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAutoConfiguration
spring.autoconfigure.exclude[1]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
spring.autoconfigure.exclude[2]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
spring.autoconfigure.exclude[3]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
spring.autoconfigure.exclude[4]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
spring.autoconfigure.exclude[5]=com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
spring.autoconfigure.exclude[6]=com.ron.javainfohunter.ai.autoconfigure.AiServiceAutoConfiguration

# Disable database
spring.autoconfigure.exclude[7]=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.autoconfigure.exclude[8]=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# RabbitMQ configuration
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
rabbitmq.listener.simple.acknowledge-mode=manual
rabbitmq.listener.simple.retry.enabled=true
rabbitmq.listener.simple.retry.max-attempts=3
rabbitmq.listener.simple.retry.initial-interval=2000
