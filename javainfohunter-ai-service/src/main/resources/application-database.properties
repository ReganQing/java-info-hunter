# ============================================================================
# JavaInfoHunter Database Configuration
# ============================================================================
# Database: PostgreSQL 16+ with pgvector extension
# ORM: Spring Data JPA (Hibernate)
# Migration: Flyway
# ============================================================================

# ----------------------------------------------------------------------------
# DataSource Configuration
# ----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/javainfohunter
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=JavaInfoHunterHikariCP

# ----------------------------------------------------------------------------
# JPA / Hibernate Configuration
# ----------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.open-in-view=false

# ----------------------------------------------------------------------------
# Flyway Database Migration
# ----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=schema_history
spring.flyway.validate-on-migrate=true

# ----------------------------------------------------------------------------
# pgvector Configuration (for vector similarity search)
# ----------------------------------------------------------------------------
# Note: pgvector extension must be installed in PostgreSQL
# See: https://github.com/pgvector/pgvector
spring.ai.vectorstore.pgvector.index-type=IVFFLAT
spring.ai.vectorstore.pgvector.dimension=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.m=100

# ----------------------------------------------------------------------------
# Custom Application Properties
# ----------------------------------------------------------------------------
javainfohunter.database.enabled=true
javainfohunter.database.vector-search.enabled=true
javainfohunter.database.fulltext-search.enabled=true
