server:
  port: 8080

spring:
  application:
    name: javainfohunter-api

  # Database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:javainfohunter}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update  # Allow schema updates in dev
    show-sql: true      # Show SQL for debugging
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false  # Disable Flyway in dev to allow DDL auto

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httptrace,env,configprops,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: false  # Disable Prometheus in dev

# SpringDoc OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true

# Knife4j configuration
knife4j:
  enable: true
  setting:
    language: en
  production: false

# Logging configuration
logging:
  level:
    root: INFO
    com.ron.javainfohunter: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JavaInfoHunter API configuration
javainfohunter:
  api:
    cors:
      enabled: true
      allowed-origins:
        - "*"  # Allow all origins in development
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
        - HEAD
      allowed-headers:
        - "*"
      allow-credentials: false  # Must be false when using wildcard origins
      max-age: 3600
