# Test configuration for javainfohunter-api

javainfohunter:
  ai:
    # Disable AI features for integration tests (no API key required)
    enabled: false
  api:
    cors:
      # Test environment uses production-like CORS configuration
      # This ensures tests verify the actual production behavior
      enabled: true
      allowed-origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: false
      max-age: 3600

spring:
  # Use in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  # Disable Spring AI autoconfiguration for tests
  ai:
    dashscope:
      enabled: false
    retry:
      enabled: false

logging:
  level:
    com.ron.javainfohunter: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
